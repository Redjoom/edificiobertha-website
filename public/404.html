<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — Edificio Bertha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0A0A0A;
      --accent:  #D4A853;
      --text:    #F5F0E8;
      --muted:   #8A8A8A;
      --border:  #2A2A2A;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .eyebrow {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(5rem, 18vw, 12rem);
      font-weight: 300;
      line-height: 1;
      color: var(--accent);
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 360px;
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .wordmark {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.3;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <p class="eyebrow">Edificio Bertha · Error</p>
  <h1>404</h1>
  <p>Esta página no existe o fue movida.<br>Regresa al inicio.</p>
  <a href="/" class="btn">Volver al inicio</a>
  <span class="wordmark">edificiobertha.mx</span>
</body>
</html>
